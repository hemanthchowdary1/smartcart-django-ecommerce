{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 max-w-md w-full relative overflow-hidden">
        
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-gray-100 rounded-full blur-2xl opacity-50"></div>

        <div class="relative z-10">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Create Account</h1>
            <p class="text-gray-500 mb-8">Join SmartCart to start shopping.</p>

            {% if error %}
            <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-6 border border-red-100">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Choose a Username</label>
                    <input type="text" name="username" placeholder="e.g. smartshopper99" required 
                           class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-black focus:border-black focus:outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Create a Password</label>
                    <input type="password" name="password" placeholder="••••••••" required 
                           class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-black focus:border-black focus:outline-none transition-all">
                </div>

                <button type="submit" class="w-full bg-black text-white font-bold rounded-xl py-3.5 hover:scale-[1.02] hover:shadow-lg transition-all duration-200 mt-2">
                    Create Account
                </button>
            </form>

            <p class="mt-8 text-center text-sm text-gray-600">
                Already have an account? 
                <a href="/accounts/login/" class="font-bold text-black hover:underline">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
