{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 max-w-md w-full relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-gray-100 rounded-full blur-2xl opacity-50"></div>

        <div class="relative z-10">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome Back</h1>
            <p class="text-gray-500 mb-8">Please enter your details to sign in.</p>

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required 
                           class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-black focus:border-black focus:outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required 
                           class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-black focus:border-black focus:outline-none transition-all">
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-600">
                        <input type="checkbox" class="mr-2 rounded border-gray-300 text-black focus:ring-black"> Remember me
                    </label>
                    <a href="#" class="font-medium text-black hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-black text-white font-bold rounded-xl py-3.5 hover:scale-[1.02] hover:shadow-lg transition-all duration-200">
                    Sign In
                </button>
            </form>

            <p class="mt-8 text-center text-sm text-gray-600">
                Don't have an account? 
                <a href="/signup/" class="font-bold text-black hover:underline">Sign up for free</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
