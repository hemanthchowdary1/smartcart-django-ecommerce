{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center px-4 py-12">
    
    <div class="bg-white p-10 md:p-14 rounded-3xl shadow-xl border border-gray-100 max-w-lg w-full text-center relative overflow-hidden">
        
        <div class="absolute -top-16 -right-16 w-40 h-40 bg-green-50 rounded-full blur-3xl opacity-60"></div>

        <div class="relative z-10">
            <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100 mb-6 border-4 border-white shadow-sm">
                <svg class="h-10 w-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>

            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Order Confirmed!</h1>
            <p class="text-gray-500 mb-8">Thank you for your purchase. We're getting it ready.</p>

            <div class="bg-gray-50 rounded-2xl p-6 mb-8 border border-gray-100 text-left">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-medium text-gray-500 uppercase tracking-wider">Order Number</span>
                    <span class="text-lg font-extrabold text-black">#{{ order.id }}</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-1">Confirmation sent to</span>
                    <span class="text-base font-semibold text-gray-900 break-all">{{ order.email }}</span>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/my-orders/" class="flex flex-1 items-center justify-center bg-black text-white font-bold px-6 py-3.5 rounded-full hover:bg-gray-800 transition-transform active:scale-95">
                    View Order
                </a>
                <a href="/" class="flex-1 bg-white text-black font-bold px-6 py-3.5 rounded-full border-2 border-gray-200 hover:border-black transition-colors">
                    Continue Shopping
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    // Trigger a subtle confetti blast when the page loads
    window.onload = function() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#000000', '#28a745', '#ffffff']
        });
    };
</script>
{% endblock %}
